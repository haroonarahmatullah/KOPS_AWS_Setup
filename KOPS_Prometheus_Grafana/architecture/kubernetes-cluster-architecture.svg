<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="awsBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7e6"/>
      <stop offset="100%" stop-color="#ffe4b3"/>
    </linearGradient>
    <linearGradient id="cpGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#326ce5"/>
      <stop offset="100%" stop-color="#1d4fa8"/>
    </linearGradient>
    <linearGradient id="workerGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="bastionGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="s3Grad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#4527a0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#37474f"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="550" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0d1b2a">Kubernetes Cluster Architecture (Provisioned with KOPS on AWS)</text>
  <text x="550" y="56" text-anchor="middle" font-size="13" fill="#37474f">Author: Ahmad — kops + kubectl + S3 state store</text>

  <!-- AWS Cloud boundary -->
  <rect x="40" y="80" width="1020" height="610" rx="14" fill="url(#awsBg)" stroke="#ff9900" stroke-width="2"/>
  <text x="60" y="105" font-size="14" font-weight="700" fill="#ff6f00">AWS Cloud — Region: us-east-1</text>

  <!-- Admin / Bastion EC2 -->
  <g filter="url(#shadow)">
    <rect x="70" y="140" width="200" height="120" rx="10" fill="url(#bastionGrad)"/>
    <text x="170" y="168" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Admin EC2 (t2.micro)</text>
    <text x="170" y="190" text-anchor="middle" fill="#fff" font-size="11">Amazon Linux 2</text>
    <text x="170" y="208" text-anchor="middle" fill="#fff" font-size="11">kops + kubectl + AWS CLI</text>
    <text x="170" y="226" text-anchor="middle" fill="#fff" font-size="11">IAM Role: Admin</text>
    <text x="170" y="244" text-anchor="middle" fill="#fff" font-size="11">(cluster bootstrapper)</text>
  </g>

  <!-- S3 state store -->
  <g filter="url(#shadow)">
    <rect x="830" y="140" width="200" height="120" rx="10" fill="url(#s3Grad)"/>
    <text x="930" y="168" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">S3 Bucket</text>
    <text x="930" y="188" text-anchor="middle" fill="#fff" font-size="11">ahmad-kops-state-store</text>
    <text x="930" y="208" text-anchor="middle" fill="#fff" font-size="11">.k8s.local</text>
    <text x="930" y="228" text-anchor="middle" fill="#fff" font-size="11">Versioning: Enabled</text>
    <text x="930" y="248" text-anchor="middle" fill="#fff" font-size="11">Stores cluster config</text>
  </g>

  <!-- Network Load Balancer -->
  <g filter="url(#shadow)">
    <rect x="450" y="140" width="200" height="60" rx="10" fill="#0277bd"/>
    <text x="550" y="166" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">AWS Load Balancer</text>
    <text x="550" y="186" text-anchor="middle" fill="#fff" font-size="11">CLB / NLB → API Server</text>
  </g>

  <!-- VPC boundary -->
  <rect x="80" y="290" width="940" height="380" rx="12" fill="#ffffff" stroke="#90a4ae" stroke-dasharray="6 4" stroke-width="1.5"/>
  <text x="100" y="312" font-size="13" font-weight="700" fill="#455a64">VPC (kops-created) — AZ: us-east-1a</text>

  <!-- Control Plane -->
  <g filter="url(#shadow)">
    <rect x="120" y="340" width="320" height="300" rx="10" fill="#e8eef9" stroke="#326ce5" stroke-width="2"/>
    <rect x="120" y="340" width="320" height="40" rx="10" fill="url(#cpGrad)"/>
    <text x="280" y="366" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Control Plane (Master) — c7i-flex.large</text>

    <rect x="140" y="395" width="130" height="48" rx="6" fill="#fff" stroke="#326ce5"/>
    <text x="205" y="416" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4fa8">kube-apiserver</text>
    <text x="205" y="432" text-anchor="middle" font-size="10" fill="#455a64">REST entrypoint</text>

    <rect x="290" y="395" width="130" height="48" rx="6" fill="#fff" stroke="#326ce5"/>
    <text x="355" y="416" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4fa8">etcd</text>
    <text x="355" y="432" text-anchor="middle" font-size="10" fill="#455a64">cluster state DB</text>

    <rect x="140" y="455" width="130" height="48" rx="6" fill="#fff" stroke="#326ce5"/>
    <text x="205" y="476" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4fa8">scheduler</text>
    <text x="205" y="492" text-anchor="middle" font-size="10" fill="#455a64">pod placement</text>

    <rect x="290" y="455" width="130" height="48" rx="6" fill="#fff" stroke="#326ce5"/>
    <text x="355" y="476" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4fa8">controller-mgr</text>
    <text x="355" y="492" text-anchor="middle" font-size="10" fill="#455a64">reconcile loops</text>

    <rect x="140" y="515" width="280" height="48" rx="6" fill="#fff" stroke="#326ce5"/>
    <text x="280" y="536" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4fa8">cloud-controller-manager</text>
    <text x="280" y="552" text-anchor="middle" font-size="10" fill="#455a64">AWS integration (ELB, EBS, IAM)</text>

    <text x="280" y="600" text-anchor="middle" font-size="11" fill="#37474f">Auto Scaling Group (master-count = 1)</text>
    <text x="280" y="618" text-anchor="middle" font-size="11" fill="#37474f">Public + Private subnets</text>
  </g>

  <!-- Worker Nodes group -->
  <g filter="url(#shadow)">
    <rect x="490" y="340" width="510" height="300" rx="10" fill="#eaf6ec" stroke="#2e7d32" stroke-width="2"/>
    <rect x="490" y="340" width="510" height="40" rx="10" fill="url(#workerGrad)"/>
    <text x="745" y="366" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Worker Node Group — t3.micro × 2 (ASG)</text>

    <!-- Worker 1 -->
    <rect x="510" y="400" width="220" height="220" rx="8" fill="#fff" stroke="#2e7d32"/>
    <text x="620" y="424" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">Worker Node 1</text>
    <rect x="525" y="438" width="190" height="34" rx="5" fill="#e8f5e9" stroke="#66bb6a"/>
    <text x="620" y="460" text-anchor="middle" font-size="11" fill="#1b5e20">kubelet</text>
    <rect x="525" y="478" width="190" height="34" rx="5" fill="#e8f5e9" stroke="#66bb6a"/>
    <text x="620" y="500" text-anchor="middle" font-size="11" fill="#1b5e20">kube-proxy</text>
    <rect x="525" y="518" width="190" height="34" rx="5" fill="#e8f5e9" stroke="#66bb6a"/>
    <text x="620" y="540" text-anchor="middle" font-size="11" fill="#1b5e20">container runtime (containerd)</text>
    <rect x="525" y="558" width="190" height="48" rx="5" fill="#fffde7" stroke="#fbc02d"/>
    <text x="620" y="578" text-anchor="middle" font-size="11" fill="#5d4037">App Pods</text>
    <text x="620" y="595" text-anchor="middle" font-size="10" fill="#5d4037">+ Prometheus / Grafana</text>

    <!-- Worker 2 -->
    <rect x="760" y="400" width="220" height="220" rx="8" fill="#fff" stroke="#2e7d32"/>
    <text x="870" y="424" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">Worker Node 2</text>
    <rect x="775" y="438" width="190" height="34" rx="5" fill="#e8f5e9" stroke="#66bb6a"/>
    <text x="870" y="460" text-anchor="middle" font-size="11" fill="#1b5e20">kubelet</text>
    <rect x="775" y="478" width="190" height="34" rx="5" fill="#e8f5e9" stroke="#66bb6a"/>
    <text x="870" y="500" text-anchor="middle" font-size="11" fill="#1b5e20">kube-proxy</text>
    <rect x="775" y="518" width="190" height="34" rx="5" fill="#e8f5e9" stroke="#66bb6a"/>
    <text x="870" y="540" text-anchor="middle" font-size="11" fill="#1b5e20">container runtime (containerd)</text>
    <rect x="775" y="558" width="190" height="48" rx="5" fill="#fffde7" stroke="#fbc02d"/>
    <text x="870" y="578" text-anchor="middle" font-size="11" fill="#5d4037">App Pods</text>
    <text x="870" y="595" text-anchor="middle" font-size="10" fill="#5d4037">+ node-exporter DaemonSet</text>
  </g>

  <!-- Connections -->
  <!-- admin -> S3 -->
  <line x1="270" y1="180" x2="830" y2="180" stroke="#37474f" stroke-width="1.8" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
  <text x="540" y="172" text-anchor="middle" font-size="11" fill="#37474f">stores cluster state</text>

  <!-- admin -> ELB -->
  <line x1="270" y1="220" x2="450" y2="170" stroke="#37474f" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="345" y="208" text-anchor="middle" font-size="11" fill="#37474f">kubectl</text>

  <!-- ELB -> control plane -->
  <line x1="550" y1="200" x2="350" y2="340" stroke="#326ce5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="265" font-size="11" fill="#1d4fa8">API:6443</text>

  <!-- control plane -> workers -->
  <line x1="440" y1="490" x2="510" y2="490" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="475" y="482" text-anchor="middle" font-size="10" fill="#2e7d32">schedules</text>

  <!-- S3 down arrow -->
  <line x1="930" y1="260" x2="930" y2="340" stroke="#7c4dff" stroke-width="1.5" stroke-dasharray="4 4"/>
</svg>
